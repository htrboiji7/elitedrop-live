<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elite Drop LIVE | VIP Cricket HD</title>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@clappr/player@latest/dist/clappr.min.js"></script>
    <style>
        /* Modern Dark Theme */
        body, html { margin: 0; padding: 0; background-color: #0f1014; color: #ffffff; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; overflow-x: hidden; }
        
        /* Sleek Header */
        .header { background-color: #1a1c23; padding: 12px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #2a2d35; position: sticky; top: 0; width: 100%; z-index: 100; box-sizing: border-box;}
        .header h1 { margin: 0; font-size: 19px; font-weight: 900; color: #4facfe; }
        .live-badge { background-color: #e63946; color: white; padding: 5px 12px; border-radius: 4px; font-size: 11px; font-weight: 800; letter-spacing: 1px; animation: blink 1.5s infinite; }
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }

        /* Video Player Area */
        .player-container { width: 100%; aspect-ratio: 16/9; background-color: #000; position: relative; border-bottom: 2px solid #2a2d35;}
        
        /* THE FIX: AJAY STYLE PREMIUM CARDS */
        .content-section { padding: 20px; display: flex; flex-direction: column; gap: 20px; padding-bottom: 50px; }
        
        .premium-card { background-color: #1a1c23; border-radius: 12px; padding: 25px 20px; text-align: center; border: 1px solid #2a2d35; box-shadow: 0 4px 15px rgba(0,0,0,0.2); }
        .card-title { color: #a0aab2; font-size: 13px; font-weight: 700; letter-spacing: 1.5px; margin-bottom: 20px; text-transform: uppercase; }
        
        /* Big Full-Width Blue Buttons */
        .btn-blue { display: block; width: 100%; background-color: #2563eb; color: #ffffff; padding: 16px 0; border-radius: 8px; font-size: 16px; font-weight: bold; text-decoration: none; box-sizing: border-box; transition: background 0.2s; }
        .btn-blue:active { background-color: #1d4ed8; transform: scale(0.98); }

        /* Force Join Overlay (Glassmorphism Trap) */
        #popup-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(15, 16, 20, 0.9); backdrop-filter: blur(8px); z-index: 999; display: flex; justify-content: center; align-items: center; }
        .popup-box { background: #1a1c23; padding: 35px 25px; border-radius: 16px; text-align: center; width: 85%; max-width: 380px; border: 1px solid #2a2d35; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .popup-box h2 { color: #ffffff; margin-top: 0; font-size: 22px; font-weight: 900; }
        .popup-box p { color: #a0aab2; font-size: 15px; margin-bottom: 25px; line-height: 1.5; }
        
        .btn-unlock { display: inline-block; width: 100%; background: #2563eb; color: white; padding: 16px 0; text-decoration: none; border-radius: 8px; font-size: 16px; font-weight: bold; box-sizing: border-box; }
    </style>
</head>
<body>

    <div class="header">
        <h1>Elite Drop L!ve</h1>
        <div class="live-badge">LIVE NOW</div>
    </div>

    <div class="player-container">
        <div id="player"></div>
    </div>

    <div class="content-section">
        
        <div class="premium-card">
            <div class="card-title">📢 Follow Us For More Updates!</div>
            <a href="https://t.me/+l3Zk4ouOuK05ZDA9" target="_blank" class="btn-blue">✈️ Join Telegram</a>
        </div>

        <div class="premium-card">
            <div class="card-title">🔗 Share Stream</div>
            <a href="#" class="btn-blue" onclick="shareSite()">Click Here To Share This Page ❤️</a>
        </div>

    </div>

    <div id="popup-overlay">
        <div class="popup-box">
            <h2>🚨 VIP MATCH LOCKED</h2>
            <p>Live Match HD me dekhne ke liye <b>Elite Drop</b> ka official Telegram channel join karein!</p>
            
            <a href="https://t.me/+l3Zk4ouOuK05ZDA9" target="_blank" class="btn-unlock" onclick="unlockVIPStream()">Join Channel Now</a>
        </div>
    </div>

    <script>
        // Clappr Setup
        var player = new Clappr.Player({
            source: "https://test-streams.mux.dev/x36xhzz/x36xhzz.m3u8", // PLACEHOLDER LINK
            parentId: "#player",
            width: '100%',
            height: '100%',
            autoPlay: false, // BROWSER AUTOPLAY ISSUE FIXED (GAANA BAND)
            mute: false 
        });

        // Popup unlock & Video Play function
        function unlockVIPStream() {
            setTimeout(function() {
                document.getElementById('popup-overlay').style.display = 'none';
                player.play(); // PLAY VIDEO ONLY AFTER CLICKING JOIN
            }, 2000); // 2 second delay for realism
        }

        // Share Link functionality
        function shareSite() {
            if (navigator.share) {
                navigator.share({
                    title: 'Elite Drop LIVE | HD Cricket',
                    text: 'Dekhiye free IPL match Elite Drop pe!',
                    url: window.location.href 
                }).then(() => {
                    console.log('Thanks for sharing!');
                }).catch((error) => console.log('Error sharing:', error));
            } else {
                alert('Share not supported on this browser. Please copy the URL manually!');
            }
        }
    </script>

</body>
</html>
